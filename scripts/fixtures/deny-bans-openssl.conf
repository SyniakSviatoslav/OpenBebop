# deny-bans-openssl.conf — RED fixture for the supply-chain property gate.
#
# This is a DERIVED deny.toml variant used ONLY to prove the gate is a real
# property-gate (not a label-gate). It is identical to the committed
# `/deny.toml` EXCEPT it bans a crate that the committed Cargo.lock ACTUALLY
# contains (tokio-tungstenite, pulled in by bebop-proto-wire). Running
#
#     cargo deny --config scripts/fixtures/deny-bans-openssl.conf check bans
#
# MUST return a non-zero exit code (the ban on a present crate must fail). If it
# does not, the gate is broken — it would also let openssl-sys/native-tls back
# in silently. This fixture is NOT used in normal CI; it is exercised by
# `scripts/ci-supply-chain.sh` (RED leg) to assert the gate can fail.
#
# To regenerate / re-tune: pick any crate name present in `cargo deny list`
# and add a `[[bans.deny]]` entry for it; the check must then fail.

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# RED target: a crate the committed lock genuinely contains.
[[bans.deny]]
name = "tokio-tungstenite"
# (The production deny.toml instead bans openssl-sys / native-tls here — crates
#  that are absent from the lock today, so the production gate passes and only
#  fails if they re-enter.)

[licenses]
version = 2
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause", "BSD-2-Clause", "BSD-3-Clause", "BSL-1.0",
    "ISC", "Zlib", "Unicode-3.0", "Unicode-DFS-2016", "CC0-1.0",
    "MPL-2.0", "LGPL-2.1-or-later", "Unlicense", "WTFPL",
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
