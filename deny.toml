# deny.toml — cargo-deny configuration (enforces §9B supply-chain law).
# Run via `bash scripts/ci-supply-chain.sh` (also runs the RED leg that
# proves this is a property-gate, not a label-gate).

[advisories]
# RustSec advisory DB; fail on any un-ignored advisory.
db-path = "advisories"
db-urls = ["https://github.com/rustsec/advisory-db"]
# `unmaintained` (e.g. paste, RUSTSEC-2024-0436) is a dev-only proc-macro with
# no safe upgrade; disabled as a class. The specific case is still recorded in
# `ignore` below with a reason so the decision is transparent, not hidden.
unmaintained = "none"

[bans]
# Wildcards: deny any dependency declared without an explicit version.
# (Caught the bebop2-core path-dep missing `version` — fixed.)
multiple-versions = "warn"
# Known, unavoidable version diamonds (documented, not hidden):
# block-buffer 0.10.4 (via argon2 -> digest 0.10) and 0.12.1
# (via chacha20poly1305 -> digest 0.12) are both required by
# distinct, non-overlapping crypto paths. Skipping the ban for this
# crate is honest (it is real and reviewed), not a false-green.
skip = ["block-buffer"]
wildcards = "deny"  # deny any dep declared without an explicit version.

[licenses]
# Bebop is AGPL-3.0. Allow the standard set shipped by audited
# RustCrypto / tokio / serde crates.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.9

[sources]
# Only crates.io + local path deps permitted (no git/alternative registries).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
