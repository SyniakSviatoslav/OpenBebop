name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # Core deps only — better-auth is optional and lazy-loaded.
      - run: npm install --omit=optional
      - name: Guard-OS self-certification
        run: npm run boot
      - name: Typecheck
        run: npm run typecheck
      - name: Falsifiable tests
        run: npm test
      - name: Doc-claim honesty gate
        run: node scripts/verify-doc-claims.mjs
      - name: Falsifiable-proof guardrail (every test can go RED)
        run: node scripts/guardrail-falsifiable-proof.mjs
